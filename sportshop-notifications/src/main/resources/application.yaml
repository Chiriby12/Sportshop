spring:
  application:
    name: sportshop-notifications
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sportshop?currentSchema=notifications}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: notifications
  security:
    user:
      name: disabled
      password: disabled

server:
  port: ${PORT:8083}

jwt:
  secret: ${JWT_SECRET:3f8a2b1c9d7e4f6a0b5c8d2e1f7a3b4c9d6e5f8a2b1c0d7e4f3a6b5c8d9e2f1a}
  expiration-ms: 3600000

notification:
  admin-email: ${NOTIFICATION_ADMIN_EMAIL:sebasgonzalez014@gmail.com}

resend:
  api-key: ${RESEND_API_KEY:re_3c2FdxFL_AB2rkzkpLEBgRgYacoffTQyF}
  from: SportShop <onboarding@resend.dev>

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha